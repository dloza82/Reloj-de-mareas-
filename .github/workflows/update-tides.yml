name: Actualizar Mareas Gijón

on:
  schedule:
    # Ejecutar cada día a las 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:  # Permite ejecutarlo manualmente

jobs:
  fetch-tides:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Descargar mareas del IHM
        run: python fetch_tides.py

      - name: Commit y push mareas.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add mareas.json
          git diff --staged --quiet || git commit -m "Actualizar mareas $(date -u '+%Y-%m-%d')"
          git push
