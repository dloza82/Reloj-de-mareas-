<body>
<canvas id="c"></canvas>
<div id="dbg">cargando...</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTES
// ─────────────────────────────────────────────────────────────────────────────
const COLS = 8, ROWS = 8, TOTAL = COLS * ROWS;
const LAT = 43.545, LON = -5.668;

// La clave de caché incluye versión. Cambiarla fuerza refresco en todos los
// dispositivos aunque tengan datos viejos de una versión anterior.
const CACHE_KEY = 'mareas_v10';

// TTL de 6 horas: las mareas cambian ~cada 6h, refresco suficiente sin abusar
const CACHE_TTL = 6 * 60 * 60 * 1000;

// Limpiar claves de versiones anteriores que ya no se usan
try { ['mareas_v9', 'mareas_v8', 'mareas_v7', 'mareas_v6', 'mareas_v5'].forEach(k => localStorage.removeItem(k)); } catch(e) {}

// makeSignal() con fallback para Android/browsers antiguos (Chrome <103)
function makeSignal(ms) {
  if (typeof AbortSignal.timeout === 'function') return AbortSignal.timeout(ms);
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), ms);
  return ctrl.signal;
}

// ─────────────────────────────────────────────────────────────────────────────
// CANVAS Y DIMENSIONES
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dbgEl = document.getElementById('dbg');

let SIZE, GAP, LIFT, PAD, W, H;

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const margin = Math.min(vw, vh) * 0.04;
  SIZE = Math.floor(Math.min((vw - margin * 2) / COLS, (vh - margin * 2) / (ROWS + 0.5)));
  GAP  = Math.max(2, Math.round(SIZE * 0.08));
  SIZE = Math.floor((vw - margin * 2 - (COLS - 1) * GAP) / COLS);
  LIFT = Math.round(SIZE * 0.25);
  PAD  = margin;
  W = vw; H = vh;
  canvas.width  = W; canvas.height  = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// ─────────────────────────────────────────────────────────────────────────────
// PALETAS
// ─────────────────────────────────────────────────────────────────────────────
const PALETTES = [
  { on:[25,70,140],    off:[155,205,235], flash:[230,248,255] },
  { on:[78,185,170],   off:[180,220,210], flash:[230,250,245] },
  { on:[162,90,180],   off:[210,170,220], flash:[240,225,245] },
  { on:[245,185,175],  off:[250,220,210], flash:[255,245,240] },
  { on:[235,220,50],   off:[245,240,155], flash:[255,252,220] },
  { on:[210,95,155],   off:[245,190,215], flash:[255,235,245] },
  { on:[155,145,135],  off:[200,195,190], flash:[235,232,230] },
  { on:[200,195,190],  off:[225,222,218], flash:[245,243,241] },
];
let paletteIndex = 0;
canvas.style.cursor = 'pointer';
canvas.addEventListener('click', () => { paletteIndex = (paletteIndex + 1) % PALETTES.length; });
function getColors() { return PALETTES[paletteIndex]; }

// ─────────────────────────────────────────────────────────────────────────────
// ESTADO DE MAREA
// ─────────────────────────────────────────────────────────────────────────────
let tideData = null;  // { lastTs, nextTs, cycleTotal, rising, source }
let waveHeightM  = 1.0;  // altura de ola en metros (Cantábrico: 0.5–4m)
let wavePeriodMs = 2500; // velocidad de animación en ms por ciclo visual

// INVARIANTE CENTRAL — no modificar sin consenso explícito:
// dark blue (on)  = nivel de agua alto  → oscuro crece al SUBIR la marea
// light blue (off) = nivel de agua bajo → oscuro decrece al BAJAR la marea
// litCount = número de píxeles oscuros, llenados de abajo a arriba
//
//   Subiendo (rising=true):  frac 0→1  →  litCount 0→64  (oscuro sube)
//   Bajando  (rising=false): frac 0→1  →  litCount 64→0  (oscuro baja)
function computeLitCount() {
  if (!tideData) return 32;

  // BUG 3 FIX: si hemos superado nextTs, el ciclo terminó.
  // Forzar re-fetch inmediato para obtener el nuevo par (último/próximo)
  // en lugar de esperar hasta el siguiente setInterval (hasta 60min).
  if (Date.now() > tideData.nextTs) {
    fetchMarineData();   // asíncrono, no bloquea el render
    return tideData.rising ? 64 : 0;  // mantener estado final hasta que lleguen datos
  }

  const frac = Math.max(0, Math.min(1, (Date.now() - tideData.lastTs) / tideData.cycleTotal));
  return tideData.rising
    ? Math.round(frac * 64)          // subiendo: oscuro crece de 0 a 64
    : Math.round((1 - frac) * 64);   // bajando:  oscuro decrece de 64 a 0
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILIDADES DE FECHA
// ─────────────────────────────────────────────────────────────────────────────
function fmtDate(d) {
  // Devuelve YYYYMMDD en hora LOCAL (necesario para IHM que trabaja en hora española)
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function fmt(ts) {
  return new Date(ts).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

// ─────────────────────────────────────────────────────────────────────────────
// PROCESAR EXTREMOS: lógica común a todas las fuentes
// ─────────────────────────────────────────────────────────────────────────────
function processTideExtremes(extremes, source) {
  const nowMs = Date.now();
  extremes.sort((a, b) => a.ts - b.ts);

  // Filtrar extremos muy viejos (más de 13h en el pasado) o muy lejanos (más de 13h en el futuro)
  // para no coger un extremo equivocado si la lista tiene datos de días anteriores
  const window13h = 13 * 3600 * 1000;
  const relevant = extremes.filter(e => e.ts > nowMs - window13h && e.ts < nowMs + window13h);

  const past   = relevant.filter(e => e.ts <= nowMs);
  const future = relevant.filter(e => e.ts >  nowMs);

  if (!past.length || !future.length) {
    console.warn(`[${source}] no hay par último/próximo en ventana ±13h. Extremos:`,
      extremes.map(e => `${e.type}@${fmt(e.ts)}`).join(' '));
    return false;
  }

  const last = past[past.length - 1];
  const next = future[0];

  // Sanidad: el ciclo debe estar entre 5h y 8h (rango real de mareas)
  const cycle = next.ts - last.ts;
  if (cycle < 4.5 * 3600000 || cycle > 8 * 3600000) {
    console.warn(`[${source}] ciclo anómalo: ${Math.round(cycle/60000)}min. Descartado.`);
    return false;
  }

  tideData = {
    lastTs:     last.ts,
    nextTs:     next.ts,
    cycleTotal: cycle,
    rising:     next.type === 'High',
    source
  };

  console.log(`[${source}] ${last.type}@${fmt(last.ts)} → ${next.type}@${fmt(next.ts)} | ${tideData.rising ? '↑' : '↓'} | ciclo=${Math.round(cycle/60000)}min | lit=${computeLitCount()}/64`);
  updateDebug();
  return true;
}

// ─────────────────────────────────────────────────────────────────────────────
// FUENTE 1: Stormglass API — CORS nativo, sin proxy, datos precisos por coordenada
// Plan gratuito: 10 requests/día. Con caché de 6h → máx 4 requests/día.
// Devuelve extremos de marea (horas exactas de pleamar/bajamar).
// ─────────────────────────────────────────────────────────────────────────────
async function fetchStormglass() {
  const key = '465b185a-2b64-11f1-a882-0242ac120004-465b18c8-2b64-11f1-a882-0242ac120004';

  // Pedimos desde hace 2h hasta dentro de 14h para asegurar par último/próximo
  const start = Math.floor(Date.now() / 1000) - 2 * 3600;
  const end   = Math.floor(Date.now() / 1000) + 14 * 3600;

  const url = `https://api.stormglass.io/v2/tide/extremes/point`
    + `?lat=${LAT}&lng=${LON}&start=${start}&end=${end}`;

  try {
    const res = await fetch(url, {
      headers: { 'Authorization': key },
      signal: makeSignal(10000)
    });
    if (!res.ok) throw new Error(`Stormglass HTTP ${res.status}`);
    const data = await res.json();

    if (!data.data?.length) {
      console.warn('[Stormglass] respuesta vacía');
      return null;
    }

    // Stormglass devuelve: [{ time: "2026-04-07T08:06:00+00:00", height: 1.8, type: "high" }, ...]
    const extremes = data.data.map(e => ({
      ts:   new Date(e.time).getTime(),
      type: e.type === 'high' ? 'High' : 'Low'
    })).filter(e => !isNaN(e.ts));

    if (extremes.length < 2) {
      console.warn('[Stormglass] extremos insuficientes:', extremes.length);
      return null;
    }

    console.log(`[Stormglass] extremos: ${extremes.map(e => `${e.type}@${fmt(e.ts)}`).join(' ')}`);
    return { extremes, source: 'Stormglass' };
  } catch(err) {
    console.warn('[Stormglass]', err.message);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// FUENTE 2: IHM directo HTTPS
// La API del IHM Armada española sí permite CORS desde HTTPS.
// Pedimos hoy Y mañana para asegurar que siempre hay un extremo futuro.
// ─────────────────────────────────────────────────────────────────────────────
async function fetchIHM_direct() {
  const today    = fmtDate(new Date());
  const tomorrowD = new Date(); tomorrowD.setDate(tomorrowD.getDate() + 1);
  const tomorrow = fmtDate(tomorrowD);
  const base = 'https://ideihm.covam.es/api-ihm/getmarea?REQUEST=gettide&PORT=gijon&FORMAT=json';
  try {
    const [r1, r2] = await Promise.all([
      fetch(`${base}&DATE=${today}`,    { signal: makeSignal(8000) }),
      fetch(`${base}&DATE=${tomorrow}`, { signal: makeSignal(8000) }),
    ]);
    if (!r1.ok || !r2.ok) throw new Error(`HTTP ${r1.status}/${r2.status}`);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    return parseIHMData([...(d1.data || []), ...(d2.data || [])], 'IHM-direct');
  } catch(err) {
    console.warn('[IHM-direct]', err.message);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// FUENTE 2: IHM vía proxy allorigins
// Fallback cuando IHM-direct falla por CORS o red.
// CORRECCIÓN: usamos HTTPS en la URL original también (allorigins acepta ambas
// pero HTTPS es más fiable).
// ─────────────────────────────────────────────────────────────────────────────
async function fetchIHM_proxy() {
  const today    = fmtDate(new Date());
  const tomorrowD = new Date(); tomorrowD.setDate(tomorrowD.getDate() + 1);
  const tomorrow = fmtDate(tomorrowD);
  // CORRECCIÓN BUG #4: URL base en HTTPS, no HTTP
  const base = 'https://ideihm.covam.es/api-ihm/getmarea?REQUEST=gettide&PORT=gijon&FORMAT=json';
  const proxy = u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`;
  try {
    const [r1, r2] = await Promise.all([
      fetch(proxy(`${base}&DATE=${today}`),    { signal: makeSignal(10000) }),
      fetch(proxy(`${base}&DATE=${tomorrow}`), { signal: makeSignal(10000) }),
    ]);
    if (!r1.ok || !r2.ok) throw new Error(`proxy HTTP ${r1.status}/${r2.status}`);
    const [j1, j2] = await Promise.all([r1.json(), r2.json()]);
    const d1 = JSON.parse(j1.contents);
    const d2 = JSON.parse(j2.contents);
    return parseIHMData([...(d1.data || []), ...(d2.data || [])], 'IHM-proxy');
  } catch(err) {
    console.warn('[IHM-proxy]', err.message);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// PARSER IHM (compartido por direct y proxy)
// Formato IHM: { fecha:"DD/MM/YYYY", hora:"HH:MM", altura:"X.XX", marea:"pleamar"|"bajamar" }
// Los timestamps IHM ya vienen en hora oficial española (Europe/Madrid, con cambio de hora).
// new Date("YYYY-MM-DDTHH:MM") sin Z → JS lo trata como hora local del dispositivo.
// Si el dispositivo está en Europe/Madrid (como es el caso), es correcto.
// ─────────────────────────────────────────────────────────────────────────────
function parseIHMData(allData, source) {
  const extremes = allData
    .filter(e => e.marea)
    .map(e => {
      const [day, mon, yr] = e.fecha.split('/');
      const ts   = new Date(`${yr}-${mon}-${day}T${e.hora}:00`).getTime();
      const type = e.marea.toLowerCase().includes('plea') ? 'High' : 'Low';
      return { ts, type };
    })
    .filter(e => !isNaN(e.ts));

  if (extremes.length < 2) {
    console.warn(`[${source}] datos insuficientes: ${allData.length} registros`);
    return null;
  }

  console.log(`[${source}] extremos crudos: ${extremes.map(e => `${e.type}@${fmt(e.ts)}`).join(' ')}`);
  return { extremes, source };
}

// ─────────────────────────────────────────────────────────────────────────────
// FUENTE 2b: IHM vía corsproxy.io — segundo proxy independiente
// ─────────────────────────────────────────────────────────────────────────────
async function fetchIHM_proxy2() {
  const today    = fmtDate(new Date());
  const tomorrowD = new Date(); tomorrowD.setDate(tomorrowD.getDate() + 1);
  const tomorrow = fmtDate(tomorrowD);
  const base  = 'https://ideihm.covam.es/api-ihm/getmarea?REQUEST=gettide&PORT=gijon&FORMAT=json';
  const proxy = u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`;
  try {
    const [r1, r2] = await Promise.all([
      fetch(proxy(`${base}&DATE=${today}`),    { signal: makeSignal(10000) }),
      fetch(proxy(`${base}&DATE=${tomorrow}`), { signal: makeSignal(10000) }),
    ]);
    if (!r1.ok || !r2.ok) throw new Error(`proxy2 HTTP ${r1.status}/${r2.status}`);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    return parseIHMData([...(d1.data || []), ...(d2.data || [])], 'IHM-proxy2');
  } catch(err) {
    console.warn('[IHM-proxy2]', err.message);
    return null;
  }
}


// Datos cada hora en UTC. Detectamos máximos/mínimos con interpolación Catmull-Rom
// para obtener el minuto exacto del extremo.
// CORRECCIÓN BUG #5 (olas): la indexación por hora se hace buscando el timestamp
// correcto en el array, no asumiendo que el índice == hora UTC del día.
// ─────────────────────────────────────────────────────────────────────────────
async function fetchOpenMeteo() {
  const url = `https://marine-api.open-meteo.com/v1/marine`
    + `?latitude=${LAT}&longitude=${LON}`
    + `&hourly=sea_level&timezone=UTC&forecast_days=3`;
  try {
    const res  = await fetch(url, { signal: makeSignal(10000) });
    if (!res.ok) throw new Error(`OM HTTP ${res.status}`);
    const data = await res.json();
    if (!data.hourly?.sea_level) return null;

    const times  = data.hourly.time;
    const levels = data.hourly.sea_level;
    const extremes = [];

    for (let i = 1; i < levels.length - 2; i++) {
      const p0 = levels[i-1], p1 = levels[i], p2 = levels[i+1], p3 = levels[i+2];
      if (p0 == null || p1 == null || p2 == null || p3 == null) continue;

      const isMax = p1 > p0 && p1 >= p2;
      const isMin = p1 < p0 && p1 <= p2;
      if (!isMax && !isMin) continue;

      // Catmull-Rom para encontrar el minuto exacto del extremo
      let bestT = 0, bestVal = p1;
      for (let t = 0; t <= 60; t++) {
        const u = t / 60;
        const v = 0.5 * ((2*p1) + (-p0+p2)*u + (2*p0-5*p1+4*p2-p3)*u*u + (-p0+3*p1-3*p2+p3)*u*u*u);
        if (isMax && v > bestVal) { bestVal = v; bestT = t; }
        if (isMin && v < bestVal) { bestVal = v; bestT = t; }
      }

      // times[i] viene como "2026-04-03T04:00" en UTC → añadir 'Z' explícito
      const baseTs = new Date(times[i] + 'Z').getTime();
      extremes.push({ ts: baseTs + bestT * 60000, type: isMax ? 'High' : 'Low' });
    }

    if (extremes.length < 2) return null;

    console.log(`[OM] extremos: ${extremes.slice(0, 6).map(e => `${e.type}@${fmt(e.ts)}`).join(' ')}`);
    return { extremes, source: 'OM' };
  } catch(err) {
    console.warn('[OM]', err.message);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// OLAS — datos de Open-Meteo
// CORRECCIÓN BUG #5: buscamos el índice correcto por timestamp, no por hora UTC cruda.
// ─────────────────────────────────────────────────────────────────────────────
async function fetchWaves() {
  try {
    const url = `https://marine-api.open-meteo.com/v1/marine`
      + `?latitude=${LAT}&longitude=${LON}`
      + `&hourly=wave_height,wave_period&timezone=UTC&forecast_days=1`;
    const res  = await fetch(url, { signal: makeSignal(8000) });
    if (!res.ok) throw new Error(`waves HTTP ${res.status}`);
    const data = await res.json();
    if (!data.hourly?.wave_height || !data.hourly?.time) return;

    const nowUtc = new Date().toISOString().slice(0, 13); // "2026-04-04T14"
    const idx = data.hourly.time.findIndex(t => t.startsWith(nowUtc));
    if (idx < 0) return;

    const wh = data.hourly.wave_height[idx];  // metros
    const wp = data.hourly.wave_period[idx];  // segundos

    // Parámetro 1: velocidad visual escalada según diseño original
    // olas cortas (4s) → animación rápida (1200ms/ciclo)
    // olas largas (16s) → animación lenta (5000ms/ciclo)
    // Interpolación lineal entre esos dos extremos, clampeo fuera de rango
    if (wp != null) {
      const wpClamped = Math.max(4, Math.min(16, wp));
      wavePeriodMs = Math.round(1200 + (wpClamped - 4) / 12 * (5000 - 1200));
    }

    // Parámetro 2: tamaño de animación en metros directamente
    // Cantábrico: 0.5m → 1 píxel, 4m → 8 píxeles
    // Escala natural: wh * 2, clampeo 1–8
    if (wh != null) waveHeightM = wh;
  } catch(e) {
    // olas no son críticas, fallo silencioso
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CACHÉ — lectura y escritura en localStorage
// CORRECCIÓN BUG #2: se elimina el localStorage.clear() del arranque.
// La caché se respeta entre sesiones. Solo se borra si supera el TTL.
// ─────────────────────────────────────────────────────────────────────────────
function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const cached = JSON.parse(raw);
    if (Date.now() - cached.ts > CACHE_TTL) return null;  // caducada
    return cached;
  } catch(e) {
    return null;
  }
}

function saveCache(extremes, source) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), extremes, source }));
  } catch(e) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// ORQUESTADOR PRINCIPAL
// Orden: caché → Stormglass → IHM-direct → IHM-proxy → IHM-proxy2 → Open-Meteo → fallback
// Stormglass va primero: CORS nativo, sin proxy, arranque inmediato (~1s)
// ─────────────────────────────────────────────────────────────────────────────
async function fetchMarineData() {
  // 1. Intentar caché válida primero
  const cached = loadCache();
  if (cached) {
    const ok = processTideExtremes(cached.extremes, cached.source + '(caché)');
    if (ok) {
      fetchWaves();  // olas siempre frescas, no se cachean
      return;
    }
  }

  dbgEl.textContent = 'cargando mareas...';

  // 2. Stormglass — primera fuente, CORS nativo, datos exactos
  let result = await fetchStormglass();

  // 3. IHM directo HTTPS
  if (!result) result = await fetchIHM_direct();

  // 4. IHM vía proxy allorigins
  if (!result) result = await fetchIHM_proxy();

  // 5. IHM vía corsproxy.io (proxy alternativo independiente)
  if (!result) result = await fetchIHM_proxy2();

  // 6. Open-Meteo
  if (!result) result = await fetchOpenMeteo();

  if (result) {
    saveCache(result.extremes, result.source);
    processTideExtremes(result.extremes, result.source);
  } else {
    // ─────────────────────────────────────────────────────────────────────
    // FALLBACK DE EMERGENCIA — solo si TODAS las fuentes fallaron
    //
    // Usa tabla de extremos reales del IHM para Gijón.
    // Error máximo acotado a ~±10min, sin deriva acumulada.
    // ─────────────────────────────────────────────────────────────────────
    console.warn('[mareas] todas las fuentes fallaron — usando fallback con tabla real');

    // Extremos reales Gijón abril–junio 2026 en UTC
    // (hora española verano = UTC+2, restar 2h para obtener UTC)
    const FALLBACK_EXTREMES = [
      { ts: new Date('2026-04-05T05:02:00Z').getTime(), type: 'High' },
      { ts: new Date('2026-04-05T11:07:00Z').getTime(), type: 'Low'  },
      { ts: new Date('2026-04-05T17:15:00Z').getTime(), type: 'High' },
      { ts: new Date('2026-04-05T23:19:00Z').getTime(), type: 'Low'  },
      { ts: new Date('2026-04-06T05:48:00Z').getTime(), type: 'High' },
      { ts: new Date('2026-04-06T11:55:00Z').getTime(), type: 'Low'  },
      { ts: new Date('2026-04-06T18:02:00Z').getTime(), type: 'High' },

// ─────────────────────────────────────────────────────────────────────────────
// DEBUG OVERLAY
// ─────────────────────────────────────────────────────────────────────────────
let dbgVisible = true;
// Ocultar el debug tras 60 segundos para no molestar en uso normal
setTimeout(() => { dbgVisible = false; dbgEl.textContent = ''; }, 60000);

function updateDebug() {
  if (!dbgVisible || !tideData) return;
  const nowMs   = Date.now();
  const elapsed = Math.round((nowMs - tideData.lastTs) / 60000);
  const total   = Math.round(tideData.cycleTotal / 60000);
  const frac    = ((nowMs - tideData.lastTs) / tideData.cycleTotal * 100).toFixed(1);
  const lit     = computeLitCount();
  const dir     = tideData.rising ? '↑ subiendo' : '↓ bajando';
  dbgEl.innerHTML =
    `[${tideData.source}] ${dir} · lit=${lit}/64 · ${frac}% · ${elapsed}/${total}min`
    + `<br>último: ${fmt(tideData.lastTs)} → próximo: ${fmt(tideData.nextTs)}`;
}

setInterval(updateDebug, 5000);

// ─────────────────────────────────────────────────────────────────────────────
// RENDER — lógica visual (sin cambios respecto al original)
// ─────────────────────────────────────────────────────────────────────────────
function buildScanOrder() {
  const o = [];
  for (let row = ROWS-1; row >= 0; row--)
    for (let col = 0; col < COLS; col++)
      o.push(row * COLS + col);
  return o;
}

const ORDER_UP   = buildScanOrder();
const ORDER_DOWN = [...ORDER_UP].reverse();

// Mapas inversos idx→posición precalculados una sola vez.
// order.map() dentro de draw() recreaba el Map 60 veces/segundo — innecesario
// porque ORDER_UP y ORDER_DOWN nunca cambian.
const WAVE_POS_UP   = new Map(ORDER_UP.map((idx, pos)   => [idx, pos]));
const WAVE_POS_DOWN = new Map(ORDER_DOWN.map((idx, pos) => [idx, pos]));

// Cache de litSet: evita recrear el Set 60 veces/segundo.
// litCount cambia como mucho una vez por segundo, no 60 veces.
let _cachedLitCount = -1;
let _cachedLitSet   = new Set();

function lerp3(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(a[0] + (b[0]-a[0]) * t),
    Math.round(a[1] + (b[1]-a[1]) * t),
    Math.round(a[2] + (b[2]-a[2]) * t),
  ];
}

// ox, oy = origen del grid precalculado en draw() — evita recalcular 64 veces/frame
function drawPixel(row, col, color, ox, oy) {
  const x = ox + col * (SIZE + GAP);
  const y = oy + row * (SIZE + GAP);
  const [r, g, b] = color;

  ctx.fillStyle   = `rgb(${r},${g},${b})`;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  if (col % 2 === 0) {
    ctx.moveTo(x,        y + LIFT);
    ctx.lineTo(x + SIZE, y);
    ctx.lineTo(x + SIZE, y + SIZE);
    ctx.lineTo(x,        y + SIZE + LIFT);
  } else {
    ctx.moveTo(x,        y);
    ctx.lineTo(x + SIZE, y + LIFT);
    ctx.lineTo(x + SIZE, y + SIZE + LIFT);
    ctx.lineTo(x,        y + SIZE);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function draw(litCount, rising, wavePos) {
  ctx.clearRect(0, 0, W, H);

  // litSet cacheado: solo se regenera cuando litCount cambia (no 60 veces/segundo)
  if (litCount !== _cachedLitCount) {
    _cachedLitSet   = new Set(ORDER_UP.slice(0, litCount));
    _cachedLitCount = litCount;
  }
  const litSet = _cachedLitSet;

  const order    = rising ? ORDER_UP : ORDER_DOWN;
  // BUG 1+2 FIX: usar TOTAL (64) en lugar de TOTAL-1 (63) como multiplicador.
  // Con TOTAL-1, wavePos∈[0,1) → headI∈[0,62.x] → el píxel en posición 63
  // (abajo-izquierda al bajar, arriba-derecha al subir) nunca recibe dist≈0
  // y nunca se ilumina. Con TOTAL, headI puede llegar a 63.x → dist<1 → flash correcto.
  const headI    = wavePos * TOTAL;
  // Parámetro 2: tamaño de la cola de ola en píxeles
  // 0.5m→1px, 1m→2px, 2m→4px, 4m→8px — escala natural para el Cantábrico
  const WAVE_LEN = Math.max(1, Math.min(8, Math.round(waveHeightM * 2)));

  // Paleta una sola vez por frame, no 64
  const { on, off, flash: fc } = getColors();

  // Mapa inverso precalculado (no se recrea en cada frame)
  const waveOrderPos = rising ? WAVE_POS_UP : WAVE_POS_DOWN;

  // Coordenadas de origen del grid precalculadas una vez por frame
  const gridW = COLS * SIZE + (COLS - 1) * GAP;
  const gridH = ROWS * SIZE + (ROWS - 1) * GAP + LIFT;
  const ox = (W - gridW) / 2;
  const oy = (H - gridH) / 2;

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const idx  = row * COLS + col;
      const isOn = litSet.has(idx);
      const base = isOn ? on : off;

      const waveI = waveOrderPos.get(idx);
      const dist  = headI - waveI;
      let flash   = 0;
      if (dist >= 0 && dist <= WAVE_LEN) flash = Math.pow(1 - dist / WAVE_LEN, 2);

      const color = lerp3(base, fc, flash * 0.95);

      if (flash > 0.1) { ctx.shadowColor = `rgba(200,240,255,${flash * 0.5})`; ctx.shadowBlur = 14 * flash; }
      else ctx.shadowBlur = 0;

      drawPixel(row, col, color, ox, oy);
    }
  }
  ctx.shadowBlur = 0;
}

// ─────────────────────────────────────────────────────────────────────────────
// PWA — service worker y fullscreen
// NOTA: mantenemos el desregistro del SW para evitar que una versión vieja
// del SW sirva HTML obsoleto. La caché real de datos de marea está en
// localStorage (no en el SW cache), así que este unregister no afecta a los
// datos de marea.
// ─────────────────────────────────────────────────────────────────────────────
function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen)       el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
document.addEventListener('click', goFullscreen);
goFullscreen();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}

// Refrescar datos cuando la app vuelve al primer plano
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  // Solo refrescamos si la caché está caducada
  const cached = loadCache();
  if (!cached) fetchMarineData();
  else {
    // Aunque la caché sea válida, re-procesamos para actualizar el estado en memoria
    // (tideData puede haberse perdido si el dispositivo mató el proceso)
    if (!tideData) processTideExtremes(cached.extremes, cached.source + '(caché)');
  }
});

// Refresco periódico cada hora — referencia guardada para evitar acumulación
const _refreshInterval = setInterval(fetchMarineData, 60 * 60 * 1000);

// ─────────────────────────────────────────────────────────────────────────────
// ARRANQUE
// ─────────────────────────────────────────────────────────────────────────────
fetchMarineData();

function loop(ts) {
  const wavePos = (ts % wavePeriodMs) / wavePeriodMs;
  draw(computeLitCount(), tideData ? tideData.rising : true, wavePos);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
