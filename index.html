<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=4.0">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Reloj de Mareas">
<title>Reloj de Mareas · Gijón</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    position: fixed;
    top: 0; left: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #dbg {
    position: fixed;
    bottom: 8px;
    left: 0; right: 0;
    text-align: center;
    font-family: monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    pointer-events: none;
    z-index: 10;
    line-height: 1.5;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dbg"></div>
<script>

const COLS = 8, ROWS = 8, TOTAL = COLS * ROWS;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dbgEl = document.getElementById('dbg');

// ── Dimensiones ───────────────────────────────────────
let SIZE, GAP, LIFT, PAD, W, H;

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const margin = Math.min(vw, vh) * 0.04;
  const cellW  = (vw - margin * 2) / COLS;
  const cellH  = (vh - margin * 2) / (ROWS + 0.5);

  SIZE = Math.floor(Math.min(cellW, cellH));
  GAP  = Math.max(2, Math.round(SIZE * 0.08));
  LIFT = Math.round(SIZE * 0.25);
  PAD  = margin;

  SIZE = Math.floor((vw - PAD * 2 - (COLS - 1) * GAP) / COLS);
  LIFT = Math.round(SIZE * 0.25);

  W = vw;
  H = vh;

  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}

resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// ── Paletas ───────────────────────────────────────────
const PALETTES = [
  { on: [25,  70,  140], off: [155, 205, 235], flash: [230, 248, 255] },
  { on: [78,  185, 170], off: [180, 220, 210], flash: [230, 250, 245] },
  { on: [162,  90, 180], off: [210, 170, 220], flash: [240, 225, 245] },
  { on: [245, 185, 175], off: [250, 220, 210], flash: [255, 245, 240] },
  { on: [235, 220,  50], off: [245, 240, 155], flash: [255, 252, 220] },
  { on: [210,  95, 155], off: [245, 190, 215], flash: [255, 235, 245] },
  { on: [155, 145, 135], off: [200, 195, 190], flash: [235, 232, 230] },
  { on: [200, 195, 190], off: [225, 222, 218], flash: [245, 243, 241] },
];
let paletteIndex = 0;
canvas.style.cursor = 'pointer';
canvas.addEventListener('click', () => {
  paletteIndex = (paletteIndex + 1) % PALETTES.length;
});
function getColors() { return PALETTES[paletteIndex]; }

// ── Estado de marea ───────────────────────────────────
// tideData guarda los datos crudos; litCount se calcula en cada frame
let tideData     = null;   // { lastTs, cycleTotal, rising }
let waveHeightFt = 3;
let wavePeriodMs = 3000;

// Calcula litCount en tiempo real a partir de tideData
// *** ESTA ES LA FUNCIÓN CLAVE — no se guarda litCount estático ***
function computeLitCount() {
  if (!tideData) return 32; // fallback inicial
  const elapsed  = Date.now() - tideData.lastTs;
  const frac     = Math.max(0, Math.min(1, elapsed / tideData.cycleTotal));
  return tideData.rising
    ? Math.round(frac * 64)
    : Math.round((1 - frac) * 64);
}

// ── API ───────────────────────────────────────────────
const OM_LAT   = 43.545, OM_LON = -5.668;
const SG_KEY   = '465b185a-2b64-11f1-a882-0242ac120004-465b18c8-2b64-11f1-a882-0242ac120004';
const CACHE_KEY = 'sg_tides_cache_v3';  // v3 = nueva versión, limpia caches viejas
const CACHE_TTL = 8 * 60 * 60 * 1000;

// Limpiar cachés antiguas (v1, v2)
try {
  ['sg_tides_cache', 'sg_tides_cache_v1', 'sg_tides_cache_v2'].forEach(k => localStorage.removeItem(k));
} catch(e) {}

function fetchMarineData() {
  fetchTides();
  fetchWaves();
}

function fetchTides() {
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const { ts, extremes } = JSON.parse(cached);
      if (Date.now() - ts < CACHE_TTL) {
        processTideExtremes(extremes);
        return;
      }
    }
  } catch(e) {}

  const now   = new Date();
  const start = Math.floor(now.getTime() / 1000);
  const end   = start + 3 * 24 * 3600;

  const controller = new AbortController();
  const timeout = setTimeout(() => { controller.abort(); fallbackTide(); }, 10000);

  fetch(`https://api.stormglass.io/v2/tide/extremes/point?lat=${OM_LAT}&lng=${OM_LON}&start=${start}&end=${end}`, {
    headers: { 'Authorization': SG_KEY },
    signal: controller.signal
  })
  .then(r => { clearTimeout(timeout); return r.json(); })
  .then(data => {
    if (!data.data || data.data.length < 2) { fallbackTide(); return; }
    const extremes = data.data.map(e => ({
      ts:   new Date(e.time).getTime(),
      type: e.type === 'high' ? 'High' : 'Low'
    }));
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), extremes }));
    } catch(e) {}
    processTideExtremes(extremes);
  })
  .catch(() => { clearTimeout(timeout); fallbackTide(); });
}

function processTideExtremes(extremes) {
  const nowMs  = Date.now();

  // Ordenar por tiempo (por si acaso)
  extremes.sort((a, b) => a.ts - b.ts);

  const past   = extremes.filter(e => e.ts <= nowMs);
  const future = extremes.filter(e => e.ts >  nowMs);

  if (!past.length || !future.length) { fallbackTide(); return; }

  const lastTide   = past[past.length - 1];  // extremo más reciente pasado
  const nextTide   = future[0];              // próximo extremo

  // rising = true  → vamos hacia pleamar (nextTide es High)
  // rising = false → vamos hacia bajamar  (nextTide es Low)
  const rising     = nextTide.type === 'High';
  const cycleTotal = nextTide.ts - lastTide.ts;

  // Guardar datos crudos — litCount se recalcula en cada frame
  tideData = { lastTs: lastTide.ts, cycleTotal, rising };

  // Debug
  const lastTime = new Date(lastTide.ts).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  const nextTime = new Date(nextTide.ts).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  const elapsed  = Math.round((nowMs - lastTide.ts) / 60000);
  const total    = Math.round(cycleTotal / 60000);
  const lit      = computeLitCount();
  console.log(`[mareas] Último: ${lastTide.type} ${lastTime} | Próximo: ${nextTide.type} ${nextTime} | rising=${rising} | elapsed=${elapsed}min / ${total}min | litCount=${lit}`);
  updateDebug();
}

async function fetchWaves() {
  try {
    const url  = `https://marine-api.open-meteo.com/v1/marine?latitude=${OM_LAT}&longitude=${OM_LON}&hourly=wave_height,wave_period&timezone=Europe%2FMadrid&forecast_days=1`;
    const res  = await fetch(url);
    const data = await res.json();
    const hour = new Date().getHours();
    const h    = data.hourly.wave_height[hour];
    const p    = data.hourly.wave_period[hour];
    if (h) waveHeightFt = h * 3.281;
    if (p) wavePeriodMs = p * 1000;
  } catch(e) {}
}

function fallbackTide() {
  const now   = Date.now();
  const CYCLE = 6 * 3600 * 1000 + 12 * 60 * 1000;
  // Anclar en una pleamar conocida (1 enero 2024 00:00 UTC como referencia)
  const ANCHOR = new Date('2024-01-01T00:00:00Z').getTime();
  const phase  = ((now - ANCHOR) % CYCLE) / CYCLE;
  tideData = {
    lastTs:     now - phase * CYCLE,
    cycleTotal: CYCLE,
    rising:     phase < 0.5
  };
  console.warn('[mareas] Usando fallback sinusoidal');
  updateDebug();
}

// ── Debug overlay ─────────────────────────────────────
let dbgVisible = true;
// Ocultar debug tras 30 segundos
setTimeout(() => {
  dbgVisible = false;
  dbgEl.textContent = '';
}, 30000);

function updateDebug() {
  if (!dbgVisible || !tideData) return;
  const nowMs    = Date.now();
  const elapsed  = Math.round((nowMs - tideData.lastTs) / 60000);
  const total    = Math.round(tideData.cycleTotal / 60000);
  const frac     = ((nowMs - tideData.lastTs) / tideData.cycleTotal * 100).toFixed(1);
  const lit      = computeLitCount();
  const dir      = tideData.rising ? '↑ subiendo' : '↓ bajando';
  const lastTime = new Date(tideData.lastTs).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  const nextTs   = tideData.lastTs + tideData.cycleTotal;
  const nextTime = new Date(nextTs).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  dbgEl.innerHTML = `${dir} · lit=${lit}/64 · ${frac}% · ${elapsed}/${total}min<br>último: ${lastTime} → próximo: ${nextTime}`;
}
setInterval(updateDebug, 5000);

// ── Orden ola ─────────────────────────────────────────
function buildScanOrder() {
  const order = [];
  for (let row = ROWS-1; row >= 0; row--)
    for (let col = 0; col < COLS; col++)
      order.push(row * COLS + col);
  return order;
}
const ORDER_UP   = buildScanOrder();
const ORDER_DOWN = [...ORDER_UP].reverse();

function lerp3(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t),
  ];
}

// ── Dibujar píxel Tidey ───────────────────────────────
function drawPixel(row, col, color) {
  const gridW = COLS * SIZE + (COLS - 1) * GAP;
  const gridH = ROWS * SIZE + (ROWS - 1) * GAP + LIFT;
  const offsetX = (W - gridW) / 2;
  const offsetY = (H - gridH) / 2;

  const x = offsetX + col * (SIZE + GAP);
  const y = offsetY + row * (SIZE + GAP);
  const [r,g,b] = color;

  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1.5;

  ctx.beginPath();
  if (col % 2 === 0) {
    ctx.moveTo(x,        y + LIFT);
    ctx.lineTo(x + SIZE, y);
    ctx.lineTo(x + SIZE, y + SIZE);
    ctx.lineTo(x,        y + SIZE + LIFT);
  } else {
    ctx.moveTo(x,        y);
    ctx.lineTo(x + SIZE, y + LIFT);
    ctx.lineTo(x + SIZE, y + SIZE + LIFT);
    ctx.lineTo(x,        y + SIZE);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// ── Draw ──────────────────────────────────────────────
function draw(litCount, rising, wavePos) {
  ctx.clearRect(0, 0, W, H);

  const litSet = new Set(ORDER_UP.slice(0, litCount));
  const order  = rising ? ORDER_UP : ORDER_DOWN;

  const headI    = wavePos * (TOTAL - 1);
  const WAVE_LEN = Math.max(1, Math.min(8, Math.round(waveHeightFt)));

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const idx  = row * COLS + col;
      const isOn = litSet.has(idx);
      const { on, off, flash: flashColor } = getColors();
      const base = isOn ? on : off;

      const waveI = order.indexOf(idx);
      const dist  = headI - waveI;
      let flash = 0;
      if (dist >= 0 && dist <= WAVE_LEN)
        flash = Math.pow(1 - dist / WAVE_LEN, 2);

      const color = lerp3(base, flashColor, flash * 0.95);

      if (flash > 0.1) {
        ctx.shadowColor = `rgba(200,240,255,${flash*0.5})`;
        ctx.shadowBlur  = 14 * flash;
      } else {
        ctx.shadowBlur = 0;
      }

      drawPixel(row, col, color);
    }
  }
  ctx.shadowBlur = 0;
}

// ── Pantalla completa ─────────────────────────────────
function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
document.addEventListener('click', goFullscreen, { once: false });
goFullscreen();

// ── Service Workers ───────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}

// ── Visibilidad: re-calcular al volver a primer plano ─
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // Si los datos tienen más de 8h, refrescar API
    // Si no, solo recalcular (computeLitCount lo hace en cada frame)
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { ts } = JSON.parse(cached);
        if (Date.now() - ts > CACHE_TTL) fetchMarineData();
      } else {
        fetchMarineData();
      }
    } catch(e) { fetchMarineData(); }
  }
});

// ── Loop ──────────────────────────────────────────────
fetchMarineData();
setInterval(fetchMarineData, 60 * 60 * 1000); // recargar API cada hora

// *** litCount se calcula en CADA FRAME con Date.now() — no hay setInterval ***
function loop(ts) {
  const wavePos  = (ts % wavePeriodMs) / wavePeriodMs;
  const litCount = computeLitCount();          // ← tiempo real, siempre exacto
  const rising   = tideData ? tideData.rising : true;
  draw(litCount, rising, wavePos);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
